<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuyisile Tshaka - Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ffb6d9 0%, #a8d8ff 50%, #ffc8e8 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .greeting-board {
            text-align: center;
            padding: 3rem 4rem;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 8px 32px rgba(255, 182, 217, 0.4),
                0 0 60px rgba(168, 216, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .word {
            display: inline-block;
            margin: 0 0.2rem;
            animation: float 3s ease-in-out infinite;
        }

        .hi {
            font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
            font-size: 5rem;
            font-weight: 700;
            color: #ff1493;
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 20px #ff69b4,
                0 0 30px #ff1493;
            animation-delay: 0s;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 600;
            color: #1e90ff;
            text-shadow: 
                0 0 10px #87ceeb,
                0 0 20px #87ceeb;
            animation-delay: 0.2s;
        }

        .presenting {
            font-size: 1.8rem;
            font-weight: 300;
            color: #d100a8;
            margin-top: 1rem;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.8);
            animation-delay: 0.4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                0 0 6px #fff,
                0 0 12px #ffb6d9,
                0 0 18px #a8d8ff;
            animation: sparkleAnim 2s linear infinite;
        }

        @keyframes sparkleAnim {
            0% { 
                transform: translateY(0) scale(0); 
                opacity: 0; 
            }
            50% { 
                transform: scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(-100px) scale(0); 
                opacity: 0; 
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent);
            background-size: 200% 200%;
            animation: glitterMove 10s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes glitterMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @media (max-width: 768px) {
            .greeting-board { padding: 2rem; margin: 1rem; }
            .hi { font-size: 3rem; }
            .name { font-size: 1.8rem; }
            .presenting { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="greeting-board">
        <div>
            <span class="word hi">Hi!</span>
        </div>
        <div style="margin-top: 1rem;">
            <span class="word name">My name is</span>
            <span class="word name" style="animation-delay: 0.3s;">Vuyisile</span>
            <span class="word name" style="animation-delay: 0.4s;">Tshaka</span>
        </div>
        <div class="word presenting" style="animation-delay: 0.6s;">
            and I'll be presenting my work. So far I have done  projects with Python, SQL, HTML, CSS and JavaScript. 
        </div>
    </div>

    <script>
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 3000);
        }

        setInterval(createSparkle, 150);

        document.addEventListener('click', (e) => {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    sparkle.style.left = e.clientX + (Math.random() - 0.5) * 100 + 'px';
                    sparkle.style.top = e.clientY + (Math.random() - 0.5) * 100 + 'px';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 2000);
                }, i * 30);
            }
        });
    </script>
</body>
</html>
